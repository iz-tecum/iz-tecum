<!doctype html>
<html lang="en">
  <head>

    <title>Your Name</title>

      a { text-decoration: none; }
      .card { margin-top: 24px; padding: 18px; border: 1px solid #eee; border-radius: 14px; }

    <div class="wrap">
      <h1>Your Name</h1>

        <ul>
          <li><a href="#">Project 1</a> — one-line description</li>
          <li><a href="#">Project 2</a> — one-line description</li>
        </ul>
      </div>

      <div class="card links">
        <p><strong>Links</strong></p>
        <a href="https://github.com/YOURUSERNAME">GitHub</a>
        <a href="https://www.linkedin.com/">LinkedIn</a>
        <a href="mailto:you@example.com">Email</a>

    </div>

</html>
